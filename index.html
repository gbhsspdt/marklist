<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examination Result Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1e1b4b;
  --ink-2:#4338ca;
  --paper:#ffffff;
  --paper-2:#f5f3ff;
  --rule:#e5e7eb;
  --brass:#7c3aed;
  --brass-deep:#5b21b6;
  --accent2:#06b6d4;
  --accent3:#ec4899;
  --accent4:#f97316;
  --pass:#16a34a;
  --fail:#ef4444;
  --absent:#f59e0b;
  --text:#1f2937;
  --text-soft:#6b7280;
  --serif:'Poppins', 'Inter', sans-serif;
  --sans:'Inter', system-ui, sans-serif;
  --mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:linear-gradient(135deg,#4f46e5 0%, #7c3aed 45%, #ec4899 100%);
  background-attachment:fixed;
  color:var(--text);
  min-height:100vh;
}
.app{
  max-width:1180px;
  margin:28px auto;
  min-height:calc(100vh - 56px);
  background:var(--paper);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 24px 70px rgba(30,27,75,.35);
  position:relative;
}
/* ---------- Top ribbon ---------- */
.ribbon{
  background:linear-gradient(120deg, var(--brass-deep), var(--brass) 55%, var(--accent3));
  color:#fff;
  padding:20px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.ribbon .brand{display:flex;align-items:center;gap:12px;}
.ribbon .seal{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.16);
  border:2px solid rgba(255,255,255,.55);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif); font-weight:700; color:#fff; font-size:15px;
}
.ribbon h1{font-family:var(--serif); font-weight:700; font-size:19px; margin:0; letter-spacing:.2px; color:#fff;}
.ribbon .sub{font-family:var(--mono); font-size:11px; color:rgba(255,255,255,.88); letter-spacing:.08em;}
.ribbon nav{display:flex; gap:10px;}
.ribbon nav button{
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.45); color:#fff;
  font-family:var(--sans); font-weight:600; font-size:12.5px; padding:9px 16px; border-radius:999px; cursor:pointer;
  letter-spacing:.03em; transition:background .15s ease, border-color .15s ease;
}
.ribbon nav button:hover{background:rgba(255,255,255,.28); border-color:#fff;}

/* ---------- Generic screen ---------- */
.screen{padding:40px 48px 64px;}
.eyebrow{
  font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--brass-deep); margin-bottom:6px; font-weight:600;
}
h2.title{font-family:var(--serif); font-size:30px; font-weight:700; margin:0 0 6px; color:var(--ink);}
p.lede{color:var(--text-soft); margin:0 0 32px; max-width:640px; line-height:1.55;}

/* ---------- Home: group index cards ---------- */
.index-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:18px;
}
.index-card{
  position:relative;
  background:var(--paper);
  border:1px solid var(--rule);
  border-top:5px solid var(--brass);
  border-radius:16px;
  padding:20px 20px 22px;
  cursor:pointer;
  box-shadow:0 2px 10px rgba(31,41,55,.06);
  transition:transform .15s ease, box-shadow .15s ease;
}
.index-card:nth-child(4n+1){border-top-color:var(--brass);}
.index-card:nth-child(4n+2){border-top-color:var(--accent2);}
.index-card:nth-child(4n+3){border-top-color:var(--accent3);}
.index-card:nth-child(4n+4){border-top-color:var(--accent4);}
.index-card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 32px rgba(124,58,237,.22);
}
.index-card .code{
  font-family:var(--mono); font-size:11px; color:var(--brass-deep); letter-spacing:.06em; font-weight:600;
}
.index-card h3{
  font-family:var(--serif); font-size:19px; font-weight:600; margin:6px 0 10px; color:var(--ink); line-height:1.25;
}
.index-card .count{font-size:12.5px; color:var(--text-soft);}
.index-card .arrow{position:absolute; right:18px; bottom:18px; color:var(--brass); font-size:18px; font-weight:700;}

/* ---------- Choice cards (mode / subject picks) ---------- */
.choice-row{display:flex; gap:18px; flex-wrap:wrap;}
.choice-card{
  flex:1 1 260px;
  background:var(--paper); border:1px solid var(--rule); border-radius:16px; padding:24px;
  cursor:pointer; box-shadow:0 2px 10px rgba(31,41,55,.05);
  transition:box-shadow .15s ease, border-color .15s ease, transform .15s ease;
}
.choice-card:hover{border-color:var(--brass); box-shadow:0 16px 30px rgba(124,58,237,.2); transform:translateY(-3px);}
.choice-card .tag{
  display:inline-block; font-family:var(--mono); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em;
  color:var(--brass-deep); background:var(--paper-2); padding:4px 10px; border-radius:999px;
}
.choice-card h3{font-family:var(--serif); font-weight:600; font-size:20px; margin:10px 0 8px; color:var(--ink);}
.choice-card p{margin:0; font-size:13.5px; color:var(--text-soft); line-height:1.5;}

.subject-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px;}
.subject-chip{
  background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px;
  font-family:var(--serif); font-weight:600; font-size:16px; color:var(--ink); cursor:pointer; text-align:center;
  transition:border-color .15s ease, box-shadow .15s ease;
}
.subject-chip:hover{background:var(--paper-2); border-color:var(--brass); box-shadow:0 8px 20px rgba(124,58,237,.15);}
.subject-chip small{display:block; font-family:var(--mono); font-size:10.5px; color:var(--text-soft); margin-top:6px; letter-spacing:.03em;}

/* ---------- Login ---------- */
.login-box{max-width:380px; background:var(--paper); border:1px solid var(--rule); border-radius:18px; padding:32px; margin:0 auto; box-shadow:0 10px 32px rgba(31,41,55,.08);}
.login-box .crest{text-align:center; margin-bottom:18px;}
.login-box .crest .seal2{
  width:56px;height:56px;border-radius:50%; margin:0 auto 8px;
  background:linear-gradient(135deg, var(--brass), var(--accent3)); border:none;
  display:flex;align-items:center;justify-content:center; font-family:var(--serif); color:#fff; font-size:22px; font-weight:700;
}
label{display:block; font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-soft); margin:14px 0 6px;}
input[type=text],input[type=password],input[type=number]{
  width:100%; padding:11px 12px; border:1px solid var(--rule); border-radius:10px; background:#fff; font-family:var(--sans); font-size:14px;
}
input:focus{outline:2px solid var(--brass); outline-offset:1px;}
.btn{
  font-family:var(--sans); font-weight:600; font-size:13.5px; letter-spacing:.02em;
  background:linear-gradient(120deg, var(--brass), var(--brass-deep)); color:#fff; border:none; padding:12px 24px; cursor:pointer;
  border-radius:999px; box-shadow:0 6px 16px rgba(124,58,237,.35); transition:filter .15s ease, box-shadow .15s ease;
}
.btn:hover{filter:brightness(1.08); box-shadow:0 8px 20px rgba(124,58,237,.45);}
.btn.secondary{background:transparent; color:var(--ink); border:1.5px solid var(--rule); box-shadow:none;}
.btn.secondary:hover{border-color:var(--brass); color:var(--brass-deep);}
.btn-row{margin-top:20px; display:flex; gap:10px;}
.error-msg{color:var(--fail); font-size:13px; margin-top:10px; font-family:var(--sans);}
.back-link{
  font-family:var(--mono); font-size:12px; color:var(--text-soft); cursor:pointer; display:inline-block; margin-bottom:22px;
  letter-spacing:.03em;
}
.back-link:hover{color:var(--brass-deep);}

/* ---------- Marks entry ledger ---------- */
.ledger-meta{display:flex; gap:24px; margin-bottom:22px; flex-wrap:wrap;}
.ledger-meta div{font-size:13px;}
.ledger-meta .k{font-family:var(--mono); font-size:10.5px; text-transform:uppercase; color:var(--brass-deep); letter-spacing:.08em; display:block; font-weight:600;}
.autofill-bar{
  display:flex; align-items:center; gap:10px; margin-bottom:18px; padding:12px 16px;
  background:var(--paper-2); border:1px dashed var(--rule); border-radius:12px; font-size:13px;
}
table.ledger{width:100%; border-collapse:collapse; font-size:14px; background:#fff; border-radius:12px; overflow:hidden;}
table.ledger thead th{
  font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;
  background:linear-gradient(120deg, var(--ink), var(--ink-2)); color:#fff; padding:10px 8px; text-align:center; border-right:1px solid rgba(255,255,255,.12);
}
table.ledger tbody td{
  padding:7px 8px; border-bottom:1px solid var(--rule); border-right:1px solid #f1f0fb; text-align:center;
}
table.ledger tbody tr:nth-child(odd){background:#faf9ff;}
table.ledger td.name-cell{text-align:left; font-family:var(--sans); font-size:13.5px;}
table.ledger td.reg-cell{font-family:var(--mono); font-size:12.5px;}
table.ledger input{
  width:64px; text-align:center; padding:6px 4px; border:1px solid var(--rule); border-radius:8px; font-family:var(--mono); font-size:13px;
}
table.ledger input:focus{outline:2px solid var(--brass);}
.submit-bar{margin-top:24px; display:flex; align-items:center; gap:16px;}
.status-msg{font-size:13.5px; font-family:var(--mono);}
.status-msg.ok{color:var(--pass);}
.status-msg.err{color:var(--fail);}
.result-tag{
  font-family:var(--mono); font-weight:700; font-size:10.5px; letter-spacing:.03em;
  padding:4px 10px; border-radius:999px; display:inline-block;
}
.result-tag.PASS{color:#fff; background:var(--pass);}
.result-tag.FAIL{color:#fff; background:var(--fail);}
.result-tag.ABSENT{color:#fff; background:var(--absent);}
.result-tag.PENDING{color:var(--text-soft); background:rgba(107,114,128,.12);}

/* ---------- Analysis ---------- */
.stat-cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:32px;}
.stat-card{background:var(--paper); border:1px solid var(--rule); border-top:4px solid var(--brass); border-radius:14px; padding:16px;}
.stat-card .num{font-family:var(--serif); font-size:28px; color:var(--ink); font-weight:700;}
.stat-card .lbl{font-family:var(--mono); font-size:10.5px; text-transform:uppercase; color:var(--text-soft); letter-spacing:.05em; margin-top:4px;}
.section-block{margin-bottom:44px;}
.section-block h3{font-family:var(--serif); font-weight:600; font-size:21px; color:var(--ink); margin:0 0 4px; border-bottom:3px solid var(--brass); padding-bottom:8px; display:inline-block;}
.section-block .note{font-size:12.5px; color:var(--text-soft); margin:6px 0 16px;}
.table-wrap{overflow-x:auto;}
table.report{width:100%; border-collapse:collapse; font-size:13px; background:#fff; min-width:640px; border-radius:12px; overflow:hidden;}
table.report th{background:linear-gradient(120deg, var(--ink), var(--ink-2)); color:#fff; padding:8px 10px; font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; text-align:center;}
table.report td{padding:7px 10px; border-bottom:1px solid var(--rule); text-align:center;}
table.report tbody tr:nth-child(odd){background:#faf9ff;}
table.report td.left{text-align:left;}

.stamp{
  display:inline-flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-weight:700; font-size:11px; letter-spacing:.05em;
  border-radius:999px; min-width:58px; height:28px; padding:2px 10px;
  border:2px solid;
}
.stamp.PASS{color:var(--pass); border-color:var(--pass);}
.stamp.FAIL{color:var(--fail); border-color:var(--fail);}
.stamp.ABSENT{color:var(--absent); border-color:var(--absent);}
.stamp.PENDING{color:var(--text-soft); border-color:var(--rule);}

.group-select-row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px;}
.group-select-row button{
  font-family:var(--mono); font-size:12.5px; padding:9px 18px; background:#fff; border:1px solid var(--rule); border-radius:999px; cursor:pointer;
  transition:background .15s ease, color .15s ease, border-color .15s ease;
}
.group-select-row button.active{background:linear-gradient(120deg, var(--brass), var(--brass-deep)); color:#fff; border-color:var(--brass-deep);}
.picker-label{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--brass-deep); margin:0 0 8px; font-weight:600;}
.class-badge{
  font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
  background:rgba(255,255,255,.22); color:#fff; padding:3px 10px; border-radius:999px; margin-left:8px;
}
.medium-tag{
  display:inline-block; font-family:var(--mono); font-size:10px; letter-spacing:.04em; text-transform:uppercase;
  color:var(--brass-deep); background:var(--paper-2); padding:3px 10px; border-radius:999px; margin-top:6px;
}

.exam-picker{margin-bottom:28px; padding:16px 18px; background:var(--paper-2); border-radius:14px;}
.exam-picker .k{font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--brass-deep); margin-bottom:10px; font-weight:600;}
.exam-pill-row{display:flex; gap:10px; flex-wrap:wrap;}
.exam-pill-row button{
  font-family:var(--sans); font-size:12px; text-align:left; line-height:1.5; padding:8px 14px;
  background:#fff; border:1px solid var(--rule); border-radius:12px; cursor:pointer; color:var(--ink);
  transition:background .15s ease, color .15s ease, border-color .15s ease;
}
.exam-pill-row button small{font-family:var(--mono); color:var(--text-soft); font-size:10.5px;}
.exam-pill-row button.active{background:linear-gradient(120deg, var(--brass), var(--brass-deep)); color:#fff; border-color:var(--brass-deep);}
.exam-pill-row button.active small{color:rgba(255,255,255,.85);}

.loading{font-family:var(--mono); font-size:13px; color:var(--text-soft); padding:20px 0;}
footer.note{padding:24px 48px; font-size:11.5px; color:var(--text-soft); border-top:1px solid var(--rule); font-family:var(--mono);}

/* ---------- Home: subject completion status ---------- */
.status-box{margin-top:14px; padding-top:12px; border-top:1px dashed var(--rule);}
.status-summary{font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--brass-deep); margin-bottom:8px; font-weight:600;}
.status-summary.all-done{color:var(--pass);}
.status-list{display:flex; flex-direction:column; gap:4px; max-height:130px; overflow-y:auto; padding-right:4px;}
.status-item{font-size:11.5px; color:var(--text-soft); display:flex; align-items:center; gap:6px; line-height:1.4;}
.status-item .status-name{flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.status-count{font-family:var(--mono); font-size:10px; flex:0 0 auto;}
.status-dot{width:8px; height:8px; border-radius:50%; flex:0 0 auto;}
.status-dot.done{background:var(--pass);}
.status-dot.pending{background:var(--fail);}

/* ---------- Mobile responsiveness ---------- */
@media (max-width:720px){
  .app{ margin:0; border-radius:0; min-height:100vh; }
  .ribbon{ flex-wrap:wrap; gap:12px; padding:14px 16px; }
  .ribbon .brand{ gap:8px; }
  .ribbon .seal{ width:34px; height:34px; font-size:13px; }
  .ribbon h1{ font-size:15px; }
  .ribbon .sub{ font-size:9.5px; display:block; margin-top:2px; letter-spacing:.05em; }
  .class-badge{ font-size:9px; padding:2px 8px; }
  .ribbon nav{ flex-wrap:wrap; gap:8px; width:100%; }
  .ribbon nav button{ flex:1 1 auto; padding:8px 10px; font-size:11.5px; text-align:center; }

  .screen{ padding:20px 16px 40px; }
  .eyebrow{ font-size:10px; }
  h2.title{ font-size:22px; }
  p.lede{ font-size:13.5px; margin-bottom:22px; }

  .index-grid{ grid-template-columns:1fr; gap:14px; }
  .index-card{ padding:16px 16px 40px; }
  .index-card .arrow{ right:14px; bottom:14px; }

  .choice-row{ flex-direction:column; gap:14px; }
  .choice-card{ padding:18px; }

  .subject-grid{ grid-template-columns:1fr 1fr; gap:10px; }
  .subject-chip{ padding:12px; font-size:14px; }

  .login-box{ max-width:100%; padding:22px 18px; }

  .ledger-meta{ gap:14px 20px; margin-bottom:18px; }
  .ledger-meta div{ font-size:12px; }
  .autofill-bar{ font-size:12px; padding:10px 12px; }
  .autofill-bar label{ line-height:1.4; }
  table.ledger{ font-size:12.5px; }
  table.ledger input{ width:52px; padding:5px 3px; font-size:12px; }
  table.ledger thead th{ font-size:9.5px; padding:8px 5px; }
  table.ledger tbody td{ padding:6px 5px; }
  .submit-bar{ flex-wrap:wrap; gap:10px; }
  .submit-bar .btn, .submit-bar .btn.secondary{ flex:1 1 auto; text-align:center; padding:11px 14px; font-size:12.5px; }

  .stat-cards{ grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:24px; }
  .stat-card{ padding:12px; }
  .stat-card .num{ font-size:22px; }
  .stat-card .lbl{ font-size:9.5px; }
  .section-block{ margin-bottom:32px; }
  .section-block h3{ font-size:17px; }
  table.report{ font-size:11.5px; min-width:560px; }
  table.report th{ font-size:9.5px; padding:7px 8px; }
  .stamp{ min-width:48px; height:24px; font-size:10px; }

  .group-select-row{ gap:8px; margin-bottom:20px; }
  .group-select-row button{ padding:8px 14px; font-size:11.5px; }
  .exam-picker{ padding:12px 14px; }
  .exam-pill-row{ gap:8px; }
  .exam-pill-row button{ padding:8px 12px; font-size:11px; flex:1 1 calc(50% - 8px); }

  .status-list{ max-height:none; }
  footer.note{ padding:18px 16px; font-size:10.5px; }
}

/* ---------- Print / PDF export ---------- */
.print-only{display:none;}
.print-banner{text-align:center; margin-bottom:20px; padding-bottom:14px; border-bottom:2px solid var(--ink);}
.print-banner h2{font-family:var(--serif); font-size:22px; margin:0 0 6px; color:var(--ink);}
.print-banner .meta{font-family:var(--mono); font-size:11px; color:#444; margin-top:2px;}
@media print{
  @page{ size: A4 portrait; margin:14mm; }
  body{background:#fff;}
  .app{box-shadow:none; max-width:100%; border-radius:0; margin:0;}
  .ribbon, footer.note, #screenRoot, .no-print{display:none !important;}
  #printArea{display:block !important; padding:0 6px;}
  #printArea table.report, #printArea table.ledger{font-size:11px;}
  #printArea .section-block, #printArea .stat-cards{break-inside:avoid; page-break-inside:avoid;}
  #printArea .stamp{border-width:1.5px;}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="ribbon">
    <div class="brand">
      <div class="seal" id="sealInit">SC</div>
      <div>
        <h1 id="schoolNameHeader">St. Xavier's Higher Secondary School</h1>
        <div class="sub">HIGHER SECONDARY EXAMINATION &mdash; RESULT PORTAL <span class="class-badge" id="classBadge" style="display:none;"></span></div>
      </div>
    </div>
    <nav>
      <button onclick="goHome()">Home</button>
      <button onclick="goAnalysis()">Result Analysis</button>
      <button onclick="goClassSelect()">Change Class</button>
    </nav>
  </div>
  <div id="screenRoot"></div>
  <div id="printArea" class="print-only"></div>
  <footer class="note">Consolidated Marksheet System &middot; data stored in the school's Google Sheet &middot; enter marks as a number, or AA if the student was absent.</footer>
</div>

<script>
/* =========================================================================
   CONFIGURE THIS: paste each class's Apps Script Web App /exec URL below.
   12th Standard and 10th Standard are backed by two SEPARATE Google Sheets,
   so they each need their own deployed Apps Script Web App URL.
   ========================================================================= */
const CLASSES = {
  '12': {
    label: '12th Standard',
    sub: 'Higher Secondary Examination',
    groupWord: 'Group',
    apiUrl: "https://script.google.com/macros/s/AKfycbyKCkbWurh71uh6feX177X87tVw7yUY8tylsuVHibBvB5x9LIv35cKGSoudN-QgXeBr/exec"
  },
  '10': {
    label: '10th Standard',
    sub: 'Secondary Education (SSLC)',
    groupWord: 'Section',
    apiUrl: "https://script.google.com/macros/s/AKfycbz1ek-Lkh0me4vxreNy1G36JItsp94KLnspp3FhQvcvI4gDendelSM3XCzgzfeTWAxYxg/exec"
  }
};
const SCHOOL_NAME = "Govt. Boys Higher Secondary School, Podaturpet-631208";

/* ---------------- examination types ---------------- */
const EXAMS = [
  {code:'FMT_JUL26', name:'FIRST MIDTERM EXAM',       period:'JUL-2026'},
  {code:'QE_SEP26',  name:'QUARTERLY EXAMINATION',     period:'SEP-2026'},
  {code:'SMT_NOV26', name:'SECOND MID TERM EXAM',      period:'NOV-2026'},
  {code:'HY_DEC26',  name:'HALF-YEARLY EXAMINATION',   period:'DEC-2026'},

/* A subject only has an "Internal" column if its config actually defines a
   positive internalMax. This lets 10th Standard subjects (which have no
   internal-marks component) skip that field entirely. */
function subjectHasInternal(s){ return !!(s.internalMax && Number(s.internalMax) > 0); }

function currentApiUrl(){ return CLASSES[CURRENT_CLASS].apiUrl; }
async function apiGet(action, params={}) {
  const qs = new URLSearchParams({action, ...params}).toString();
  const res = await fetch(`${currentApiUrl()}?${qs}`);
  return res.json();
}
async function apiPost(action, payload={}) {
  const res = await fetch(currentApiUrl(), {
    method: 'POST',
    headers: {'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight on Apps Script
    body: JSON.stringify({action, ...payload})
  });
  return res.json();
}
async function ensureConfig(){
  if (!CONFIGS[CURRENT_CLASS]) CONFIGS[CURRENT_CLASS] = await apiGet('config');
  CONFIG = CONFIGS[CURRENT_CLASS];
  return CONFIG;
}

/* A mark record only counts as "entered" if every field that applies to this
   subject actually has a value (a number, or AA for absent) — not merely
   because the API returned a row for that student. This handles backends
   that pre-populate one row per student with blank fields. */
function isMarkFilled(m, s){
  const has = v => v !== undefined && v !== null && String(v).trim() !== '';
  if (s.hasTheory && !has(m.theory)) return false;
  if (s.hasPractical && !has(m.practical)) return false;
  if (subjectHasInternal(s) && !has(m.internal)) return false;
  return true;
}

/* Fetches, per subject in a group, how many students have marks entered vs total
   students, so the class teacher can see at a glance which subjects are still pending. */
async function loadGroupStatus(g){
  const box = document.getElementById(`status-${g.code}`);
  if (!box) return;
  const examAtRequest = CURRENT_EXAM;
  box.innerHTML = `<span class="loading" style="padding:0;">Checking entry status&hellip;</span>`;
  try{
    const studentsRes = await apiGet('students', {group: g.code});
    const total = (studentsRes.students || []).length;
    const marksResults = await Promise.all(
      g.subjects.map(s => apiGet('marks', {group: g.code, subject: s.name, exam: examAtRequest}).catch(()=>({marks:[]})))
    );
    if (examAtRequest !== CURRENT_EXAM) return; // exam changed again while this was loading
    let doneCount = 0;
    const rows = g.subjects.map((s, i) => {
      const marksArr = marksResults[i].marks || [];
      const entered = marksArr.filter(m => isMarkFilled(m, s)).length;
      const complete = total > 0 && entered >= total;
      if (complete) doneCount++;
      return `<div class="status-item">
        <span class="status-dot ${complete ? 'done' : 'pending'}"></span>
        <span class="status-name">${s.name}</span>
        <span class="status-count">${entered}/${total}</span>
      </div>`;
    }).join('');
    const allDone = doneCount === g.subjects.length && g.subjects.length > 0;
    box.innerHTML = `
      <div class="status-summary ${allDone ? 'all-done' : ''}">${doneCount}/${g.subjects.length} subjects completed</div>
      <div class="status-list">${rows}</div>`;
  }catch(e){
    box.innerHTML = `<div class="status-summary" style="color:var(--fail);">Entry status unavailable</div>`;
  }
}

async function doLogin(){
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = 'Checking…';
  try{
    const res = await apiPost('login', {username, password});
    if (!res.success){ errEl.textContent = res.message || 'Invalid credentials.'; return; }
    // A teacher may hold several permissions (e.g. class teacher of one
    // section AND subject teacher in another) — the backend returns all of
    // them in res.permissions. Access is granted if ANY single permission
    // covers the group/subject/mode being requested here. Fall back to the
    // old single-permission fields if an older backend is deployed.
    const perms = res.permissions || [{role: res.role, groupCode: res.groupCode, subjectName: res.subjectName}];
    const matchedPermission = perms.find(p => {
      const okGroup = p.groupCode === 'ALL' || p.groupCode === CURRENT_GROUP;
      const okSubject = p.role === 'ADMIN' || p.subjectName === 'ALL' || p.subjectName === CURRENT_SUBJECT;
      return okGroup && (CURRENT_MODE !== 'SUBJECT' || okSubject);
    });
    if (!matchedPermission){
      errEl.textContent = "You don't have access to enter marks for this group/subject.";
      return;
    }
    // Keep SESSION shaped as before (teacherName + the specific permission
    // that unlocked this screen) so the rest of the app doesn't need to change.
    SESSION = { ...res, ...matchedPermission };
    if (CURRENT_MODE === 'CONSOLIDATED') renderConsolidatedSubjectTabs();
    else renderMarksEntry(CURRENT_SUBJECT);
  }catch(e){ errEl.textContent = 'Could not reach the server. Check the API URL for this class / your network.'; }
}

/* Builds a full result-analysis report for the subject currently on screen
   (stat cards, ranked marksheet, subject stats, mark-distribution bands) —
   mirroring the consolidated Result Analysis report — and sends it to
   print, so the teacher can "Save as PDF" from the browser's print dialog. */
function downloadSubjectMarksheet(){
  const s = window._currentSubjectDef;
  const g = CONFIG.groups.find(x=>x.code===CURRENT_GROUP);
  const trs = document.querySelectorAll('#marksBody tr');

  const rowsData = Array.from(trs).map(tr=>{
    const regno = tr.getAttribute('data-regno');
    const name = tr.querySelector('.name-cell').textContent;
    const theoryEl = tr.querySelector('.m-theory');
    const practicalEl = tr.querySelector('.m-practical');
    const internalEl = tr.querySelector('.m-internal');
    const theory = theoryEl ? theoryEl.value : '';
    const practical = practicalEl ? practicalEl.value : '';
    const internal = internalEl ? internalEl.value : '';
    const r = computeRowResult(theory, practical, internal, s);
    return {regno, name, theory, practical, internal, ...r};
  });

  const totalStudents = rowsData.length;
  const absentList = rowsData.filter(r=>r.status==='ABSENT');
  const pendingList = rowsData.filter(r=>r.status==='PENDING');
  const scoredList = rowsData.filter(r=>r.numericTotal !== null);
  const appeared = scoredList.length;
  const passed = scoredList.filter(r=>r.status==='PASS').length;
  const failed = scoredList.filter(r=>r.status==='FAIL').length;
  const passPct = appeared > 0 ? ((passed/appeared)*100).toFixed(2) : '0.00';

  const totalsOnly = scoredList.map(r=>r.numericTotal);
  const highest = totalsOnly.length ? Math.max(...totalsOnly) : '&mdash;';
  const lowest = totalsOnly.length ? Math.min(...totalsOnly) : '&mdash;';
  const average = totalsOnly.length ? (totalsOnly.reduce((a,b)=>a+b,0)/totalsOnly.length).toFixed(2) : '&mdash;';
  const subjectMax = (s.hasTheory?Number(s.theoryMax):0) + (s.hasPractical?Number(s.practicalMax):0) + (subjectHasInternal(s)?Number(s.internalMax):0);

  // Rank appeared students by total marks — but only those who PASSED.
  // A failed student is excluded from ranking too, same as absent students.
  const rankableList = scoredList.filter(r=>r.status==='PASS');
  const ranked = rankableList.slice().sort((a,b)=> b.numericTotal - a.numericTotal);
  let rank = 0, prevTotal = null, seen = 0;
  const rankMap = {};
  ranked.forEach(r=>{
    seen++;
    if (r.numericTotal !== prevTotal){ rank = seen; prevTotal = r.numericTotal; }
    rankMap[r.regno] = rank;
  });

  const bandCounts = {}; BAND_LABELS.forEach(b=>bandCounts[b]=0);
  scoredList.forEach(r=>{ bandCounts[bandForScore(r.numericTotal)]++; });

  const marksheetRows = rowsData
    .slice()
    .sort((a,b)=> (rankMap[a.regno] ?? 99999) - (rankMap[b.regno] ?? 99999))
    .map(r => `
      <tr>
        <td class="left">${rankMap[r.regno] ?? '&mdash;'}</td>
        <td class="reg-cell left">${r.regno}</td>
        <td class="left">${r.name}</td>
        ${s.hasTheory ? `<td>${r.theory || '&mdash;'}</td>` : ''}
        ${s.hasPractical ? `<td>${r.practical || '&mdash;'}</td>` : ''}
        ${subjectHasInternal(s) ? `<td>${r.internal || '&mdash;'}</td>` : ''}
        <td><strong>${r.totalDisplay}</strong></td>
        <td><span class="stamp ${r.status}">${r.resultLabel}</span></td>
      </tr>`).join('');

  const overallCards = `
    <div class="stat-cards">
      <div class="stat-card"><div class="num">${totalStudents}</div><div class="lbl">Total Students</div></div>
      <div class="stat-card"><div class="num">${absentList.length}</div><div class="lbl">Absent</div></div>
      <div class="stat-card"><div class="num">${appeared}</div><div class="lbl">Appeared</div></div>
      <div class="stat-card"><div class="num">${passed}</div><div class="lbl">Passed</div></div>
      <div class="stat-card"><div class="num">${failed}</div><div class="lbl">Failed</div></div>
      <div class="stat-card"><div class="num">${passPct}%</div><div class="lbl">Pass Percentage</div></div>
    </div>`;

  const pendingNote = pendingList.length
    ? `<p style="font-family:var(--mono); font-size:11px; color:var(--fail); margin-top:6px;">${pendingList.length} student(s) still have incomplete entries and are excluded from the statistics below.</p>`
    : '';

  document.getElementById('printArea').innerHTML = `
    <div class="print-banner">
      <h2>${SCHOOL_NAME}</h2>
      <div class="meta" style="font-size:13px; font-weight:700; letter-spacing:.05em; color:var(--brass-deep); margin-top:6px;">${examLabel(CURRENT_EXAM)}</div>
      <div class="meta">${g.code} &middot; ${g.name} &mdash; ${CURRENT_SUBJECT} Result Analysis</div>
      <div class="meta">Entered by: ${SESSION.teacherName} &middot; Printed: ${new Date().toLocaleString()}</div>
    </div>

    ${overallCards}
    ${pendingNote}

    <div class="section-block">
      <h3>${CURRENT_SUBJECT} &mdash; Marksheet</h3>
      <p class="note">Result per student for this subject. Absent students are excluded from pass/fail; rank is given only to students who passed.</p>
      <div class="table-wrap">
        <table class="report">
          <thead><tr>
            <th>Rank</th><th>Reg. No.</th><th class="left">Name</th>
            ${s.hasTheory ? `<th>Theory (${s.theoryMax})</th>` : ''}
            ${s.hasPractical ? `<th>Practical (${s.practicalMax})</th>` : ''}
            ${subjectHasInternal(s) ? `<th>Internal (${s.internalMax})</th>` : ''}<th>Total (${subjectMax})</th><th>Result</th>
          </tr></thead>
          <tbody>${marksheetRows}</tbody>
        </table>
      </div>
    </div>

    <div class="section-block">
      <h3>Subject Statistics</h3>
      <div class="table-wrap">
        <table class="report">
          <thead><tr><th class="left">Subject</th><th>Total</th><th>Absent</th><th>Appeared</th><th>Passed</th><th>Failed</th><th>Pass %</th><th>Max Marks</th><th>Highest</th><th>Lowest</th><th>Average</th></tr></thead>
          <tbody><tr>
            <td class="left">${CURRENT_SUBJECT}</td>
            <td>${totalStudents}</td><td>${absentList.length}</td><td>${appeared}</td>
            <td>${passed}</td><td>${failed}</td><td>${passPct}%</td>
            <td>${subjectMax}</td><td>${highest}</td><td>${lowest}</td><td>${average}</td>
          </tr></tbody>
        </table>
      </div>
    </div>

    <div class="section-block">
      <h3>Mark Distribution</h3>
      <div class="table-wrap">
        <table class="report">
          <thead><tr>${BAND_LABELS.map(b=>`<th>${b}</th>`).join('')}</tr></thead>
          <tbody><tr>${BAND_LABELS.map(b=>`<td>${bandCounts[b]}</td>`).join('')}</tr></tbody>
        </table>
      </div>
    </div>

    <p style="font-family:var(--mono); font-size:10.5px; color:#555; margin-top:16px;">
      Note: this analysis is generated from marks as currently entered on screen. The official consolidated result is finalised in Result Analysis once all subjects for the group are submitted.
    </p>`;
  window.print();
}

/* ---------------- shared mark calculation ---------------- */
const BAND_LABELS = ['=100','>=80 And <100','>=70 And <80','>=60 And <70','>=50 And <60','>=40 And <50','>=35 And <40','<35'];
function bandForScore(score){
  if (score === 100) return '=100';
  if (score >= 80) return '>=80 And <100';
  if (score >= 70) return '>=70 And <80';
  if (score >= 60) return '>=60 And <70';
  if (score >= 50) return '>=50 And <60';
  if (score >= 40) return '>=40 And <50';
  if (score >= 35) return '>=35 And <40';
  return '<35';
}

/* Given the raw theory/practical/internal cell values for one student, works
   out their total and PASS/FAIL/ABSENT/PENDING status for this subject.
   PENDING = not all applicable fields have been filled in yet. */
function computeRowResult(theoryVal, practicalVal, internalVal, s){
  const norm = v => (v===undefined || v===null) ? '' : String(v).trim();
  const hasInternal = subjectHasInternal(s);
  const theory = s.hasTheory ? norm(theoryVal) : null;
  const practical = s.hasPractical ? norm(practicalVal) : null;
  const internal = hasInternal ? norm(internalVal) : null;
  const isAA = v => v !== null && v !== '' && v.toUpperCase() === 'AA';

  if ((s.hasTheory && isAA(theory)) || (s.hasPractical && isAA(practical)) || (hasInternal && isAA(internal))){
    return {status:'ABSENT', totalDisplay:'AA', resultLabel:'ABSENT', numericTotal:null};
  }
  const missing = (s.hasTheory && theory==='') || (s.hasPractical && practical==='') || (hasInternal && internal==='');
  if (missing){
    return {status:'PENDING', totalDisplay:'&mdash;', resultLabel:'PENDING', numericTotal:null};
  }
  const tN = s.hasTheory ? parseFloat(theory) : 0;
  const pN = s.hasPractical ? parseFloat(practical) : 0;
  const iN = hasInternal ? parseFloat(internal) : 0;
  if ((s.hasTheory && isNaN(tN)) || (s.hasPractical && isNaN(pN)) || (hasInternal && isNaN(iN))){
    return {status:'PENDING', totalDisplay:'&mdash;', resultLabel:'PENDING', numericTotal:null};
  }
  const total = (s.hasTheory?tN:0) + (s.hasPractical?pN:0) + (hasInternal?iN:0);
  const failTheory = s.hasTheory && tN < Number(s.theoryPass);
  const failPractical = s.hasPractical && pN < Number(s.practicalPass);
  const pass = !failTheory && !failPractical;
  return {status: pass?'PASS':'FAIL', totalDisplay:String(total), resultLabel: pass?'PASS':'FAIL', numericTotal: total};
}

function recalcRowFromTr(tr){
  const s = window._currentSubjectDef;
  const theoryEl = tr.querySelector('.m-theory');
  const practicalEl = tr.querySelector('.m-practical');
  const internalEl = tr.querySelector('.m-internal');
  const r = computeRowResult(
    theoryEl ? theoryEl.value : null,
    practicalEl ? practicalEl.value : null,
    internalEl ? internalEl.value : null,
    s
  );
  tr.querySelector('.cell-total').innerHTML = r.totalDisplay;
  const resultEl = tr.querySelector('.result-tag');
  resultEl.textContent = r.resultLabel;
  resultEl.className = 'result-tag ' + r.status;
}
function recalcRow(inputEl){ recalcRowFromTr(inputEl.closest('tr')); }

function applyAutofill(){
  const chk = document.getElementById('autofillChk');
  const s = window._currentSubjectDef;
  if (!chk.checked) return;
  document.querySelectorAll('#marksBody tr').forEach(tr=>{
    if (s.hasPractical){
      const p = tr.querySelector('.m-practical');
      if (p && !p.value) p.value = s.practicalMax;
    }
    if (subjectHasInternal(s)){
      const i = tr.querySelector('.m-internal');
      if (i && !i.value) i.value = s.internalMax;
    }
    recalcRowFromTr(tr);
  });
}

async function submitMarksNow(){
  const s = window._currentSubjectDef;
  const statusEl = document.getElementById('submitStatus');
  const rows = document.querySelectorAll('#marksBody tr');
  const marks = [];
  rows.forEach(tr=>{
    const regno = tr.getAttribute('data-regno');
    const rec = {regno};
    if (s.hasTheory) rec.theory = (tr.querySelector('.m-theory').value || '').trim();
    if (s.hasPractical) rec.practical = (tr.querySelector('.m-practical').value || '').trim();
    if (subjectHasInternal(s)) rec.internal = (tr.querySelector('.m-internal').value || '').trim();
    marks.push(rec);
  });
  statusEl.textContent = 'Submitting…';
  statusEl.className = 'status-msg';
  try{
    const res = await apiPost('submitMarks', {group: CURRENT_GROUP, subject: CURRENT_SUBJECT, exam: CURRENT_EXAM, marks});
    if (res.success){
      statusEl.textContent = `Saved marks for ${res.updated} students.`;
      statusEl.className = 'status-msg ok';
    } else {
      statusEl.textContent = res.message || 'Something went wrong.';
      statusEl.className = 'status-msg err';
    }
  }catch(e){
    statusEl.textContent = 'Could not reach the server.';
    statusEl.className = 'status-msg err';
  }
}

/* ================= ANALYSIS ================= */

let ANALYSIS_EXAM = null;
let ANALYSIS_DATA = null;      // cached last-fetched consolidated analysis, so toggling sort order doesn't need a re-fetch
let ANALYSIS_SORT = 'regno';   // 'regno' (default) | 'rank'

async function renderAnalysisPicker(){
  root.innerHTML = `<div class="screen"><div class="loading">Loading groups…</div></div>`;
  const cfg = await ensureConfig();
  ANALYSIS_GROUP = null;
  ANALYSIS_EXAM = null;

    <div class="screen">
      <div class="eyebrow">Result Analysis</div>

function selectAnalysisExam(code){
  ANALYSIS_EXAM = code;
  document.querySelectorAll('#examSelectRow button').forEach(b=>b.classList.toggle('active', b.dataset.exam===code));
  maybeRenderAnalysis();
}
function selectAnalysisGroup(code){
  ANALYSIS_GROUP = code;
  document.querySelectorAll('#groupSelectRow button').forEach(b=>b.classList.toggle('active', b.dataset.group===code));
  maybeRenderAnalysis();
}
function maybeRenderAnalysis(){
  const target = document.getElementById('analysisRoot');
  if (!ANALYSIS_EXAM){ target.innerHTML = `<div class="loading">Select an examination above to continue.</div>`; return; }
  if (!ANALYSIS_GROUP){ target.innerHTML = `<div class="loading">Now select a group.</div>`; return; }

}

/* Sorts the consolidated marksheet either by Register No. (default, natural
   alphanumeric order) or by Rank (students who passed, ranked lowest-first;
   everyone else — fail/absent/pending — has no rank and is listed after). */
function sortMarksheet(marksheet, mode){
  const rows = marksheet.slice();
  if (mode === 'rank'){
    rows.sort((x,y)=> (x.rank===''?9999:x.rank) - (y.rank===''?9999:y.rank));
  } else {
    rows.sort((x,y)=> String(x.regno).localeCompare(String(y.regno), undefined, {numeric:true, sensitivity:'base'}));
  }
  return rows;
}

function buildMarksheetRows(marksheet){
  return marksheet.map(st => `
      <tr>
        <td class="left">${st.rank || '&mdash;'}</td>
        <td class="reg-cell left">${st.regno}</td>
        <td class="left">${st.name}</td>
        ${st.subjects.map(sub => `<td>${sub.pass==='ABSENT' ? 'AA' : (sub.total ?? '&mdash;')}</td>`).join('')}
        <td><strong>${st.total ?? '&mdash;'}</strong></td>
        <td><span class="stamp ${st.status}">${st.status}</span></td>
      </tr>`).join('');
}

/* Re-sorts and re-renders just the marksheet table body — no re-fetch needed. */
function setAnalysisSort(mode){
  ANALYSIS_SORT = mode;
  document.querySelectorAll('#marksheetSortRow button').forEach(b=>b.classList.toggle('active', b.dataset.sort===mode));
  const body = document.getElementById('consolidatedMarksheetBody');
  if (body) body.innerHTML = buildMarksheetRows(sortMarksheet(ANALYSIS_DATA.marksheet, ANALYSIS_SORT));
}

async function renderAnalysis(groupCode, examCode){
  const target = document.getElementById('analysisRoot');
  target.innerHTML = `<div class="loading">Crunching the numbers…</div>`;
  const a = await apiGet('analysis', {group: groupCode, exam: examCode});
  if (a.error){ target.innerHTML = `<div class="loading">${a.error}</div>`; return; }
  ANALYSIS_DATA = a;
  ANALYSIS_SORT = 'regno';
  renderAnalysisBody(groupCode, examCode);
}

  const target = document.getElementById('analysisRoot');
  const a = ANALYSIS_DATA;

  const o = a.overall;
  const overallCards = `
    <div class="stat-cards">
      <div class="stat-card"><div class="num">${o.totalStudents}</div><div class="lbl">Total Students</div></div>
      <div class="stat-card"><div class="num">${o.absent}</div><div class="lbl">Absent</div></div>
      <div class="stat-card"><div class="num">${o.appeared}</div><div class="lbl">Appeared</div></div>
      <div class="stat-card"><div class="num">${o.passed}</div><div class="lbl">Passed (All Subjects)</div></div>
      <div class="stat-card"><div class="num">${o.failed}</div><div class="lbl">Failed</div></div>
      <div class="stat-card"><div class="num">${o.passPercentage}%</div><div class="lbl">Pass Percentage</div></div>
    </div>`;

  const marksheetRows = buildMarksheetRows(sortMarksheet(a.marksheet, ANALYSIS_SORT));

  const subjectHeaders = a.subjects.map(s=>`<th>${s}</th>`).join('');
  const grandMax = a.subjectStats.reduce((sum, s) => sum + (Number(s.totalMarks) || 0), 0);

  const bandLabels = ['=100','>=80 And <100','>=70 And <80','>=60 And <70','>=50 And <60','>=40 And <50','>=35 And <40','<35'];
  const subjectStatsRows = a.subjectStats.map(s => `
    <tr>
      <td class="left">${s.subject}</td>
      <td>${s.totalStudents}</td><td>${s.absent}</td><td>${s.appeared}</td>
      <td>${s.passed}</td><td>${s.failed}</td><td>${s.passPercentage}%</td>
      <td>${s.totalMarks}</td><td>${s.highest}</td><td>${s.lowest}</td><td>${s.average}</td>
    </tr>`).join('');

  const bandRows = a.subjectStats.map(s => `
    <tr>
      <td class="left">${s.subject}</td>
      ${bandLabels.map(b=>`<td>${s.bands[b]}</td>`).join('')}
    </tr>`).join('');

  const failDistKeys = Object.keys(a.failDistribution);
  const failDistRow = failDistKeys.map(k=>`<td>${a.failDistribution[k]}</td>`).join('');

  const subjFailRows = a.subjectFailures.map(s=>`
    <tr><td class="left">${s.subject}</td><td>${s.failed}</td></tr>`).join('');

  target.innerHTML = `
    <div class="eyebrow" style="margin-bottom:4px;">${examLabel(examCode)}</div>
    <div class="submit-bar no-print" style="margin:0 0 20px;">
      <button class="btn" onclick="downloadConsolidatedPDF('${groupCode}','${examCode}')">Download Full Report (PDF)</button>
    </div>

    ${overallCards}

    <div class="section-block">
      <h3>Consolidated Marksheet</h3>
      <p class="note">Result and rank per student. Absent and failed students are excluded from rank; rank is given only to students who passed.</p>
      <div class="group-select-row no-print" id="marksheetSortRow" style="margin-bottom:14px;">
        <button class="${ANALYSIS_SORT==='regno'?'active':''}" data-sort="regno" onclick="setAnalysisSort('regno')">Reg. No. wise</button>
        <button class="${ANALYSIS_SORT==='rank'?'active':''}" data-sort="rank" onclick="setAnalysisSort('rank')">Rank wise</button>
      </div>
      <div class="table-wrap">
        <table class="report">
          <thead><tr><th>Rank</th><th>Reg. No.</th><th class="left">Name</th>${subjectHeaders}<th>Total (${grandMax})</th><th>Result</th></tr></thead>
          <tbody id="consolidatedMarksheetBody">${marksheetRows}</tbody>
        </table>
      </div>
    </div>

    <div class="section-block">
      <h3>Subject-wise Statistics</h3>
      <div class="table-wrap">
        <table class="report">
          <thead><tr><th class="left">Subject</th><th>Total</th><th>Absent</th><th>Appeared</th><th>Passed</th><th>Failed</th><th>Pass %</th><th>Total Marks</th><th>Highest</th><th>Lowest</th><th>Average</th></tr></thead>
          <tbody>${subjectStatsRows}</tbody>
        </table>
      </div>
    </div>

    <div class="section-block">
      <h3>Subject-wise Mark Distribution</h3>
      <div class="table-wrap">
        <table class="report">
          <thead><tr><th class="left">Subject</th>${bandLabels.map(b=>`<th>${b}</th>`).join('')}</tr></thead>
          <tbody>${bandRows}</tbody>
        </table>
      </div>
    </div>

    <div class="section-block">
      <h3>Number of Students Failed in N Subjects</h3>
      <div class="table-wrap">
        <table class="report">
          <thead><tr>${failDistKeys.map(k=>`<th>${k} Subject${k>1?'s':''}</th>`).join('')}</tr></thead>
          <tbody><tr>${failDistRow}</tr></tbody>
        </table>
      </div>
    </div>

    <div class="section-block">
      <h3>Subject-wise Number of Failures</h3>
      <div class="table-wrap">
        <table class="report">
          <thead><tr><th class="left">Subject</th><th>No. Failed</th></tr></thead>
          <tbody>${subjFailRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

/* Clones the already-rendered consolidated analysis (marksheet + all stat
   tables) into the print-only area with a proper header, and prints it —
   this is what the class teacher uses to save the full consolidated result
   as a PDF. */
function downloadConsolidatedPDF(groupCode, examCode){
  const g = CONFIG.groups.find(x=>x.code===groupCode);
  const analysisContent = document.getElementById('analysisRoot').innerHTML;
  document.getElementById('printArea').innerHTML = `
    <div class="print-banner">
      <h2>${SCHOOL_NAME}</h2>
      <div class="meta" style="font-size:13px; font-weight:700; letter-spacing:.05em; color:var(--brass-deep); margin-top:6px;">${examLabel(examCode)}</div>
      <div class="meta">${g.code} &middot; ${g.name} &mdash; Consolidated Result Report</div>
      <div class="meta">Printed: ${new Date().toLocaleString()}</div>
    </div>
    ${analysisContent}`;
  window.print();
}
